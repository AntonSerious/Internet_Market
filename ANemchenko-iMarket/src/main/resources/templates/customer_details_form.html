<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>ANemchenko iMarket</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</head>
<body>
<div class="container">
  <h1>Customer Info </h1>
  <h3 th:text="${'ID ' + customer.id }"></h3>
  <h3 th:text="${'Name ' + customer.name }"></h3>

  <h2>Buyings</h2>
  <table class="table">
    <thead>
    <tr>
      <td>Product ID</td>
      <td>Title</td>
      <td>Price</td>
      <td></td>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${buyDetails}">
      <td th:text="${c.product.id}"></td>
      <td th:text="${c.product.title}"></td>
      <td th:text="${c.buyPrice}"></td>

    </tr>
    </tbody>
  </table>
  <a class="btn btn-primary" th:href="@{/customers}">To Customers Page</a>
</div>
</body>

</html>
