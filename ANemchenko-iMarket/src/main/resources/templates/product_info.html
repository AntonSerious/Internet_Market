<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <title>ANemchenko iMarket</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js"></script>
</head>
<body>
<div class="container">
  <h1>Product Info </h1>
  <h3 th:text="${'ID ' + product.id }"></h3>
  <h3 th:text="${'Title ' + product.title }"></h3>
  <h3 th:text="${'Price ' + product.price }"></h3>
  <h2>This product was bought by:</h2>
  <table class="table">
    <thead>
    <tr>
      <td>Customer ID</td>
      <td>Customer Name</td>
      <td>Buy Price</td>
      <td></td>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${customersInfo}">
      <td th:text="${c.customer.id}"></td>
      <td th:text="${c.customer.name}"></td>
      <td th:text="${c.buyPrice}"></td>
      <p></p>
    </tr>
    </tbody>
  </table>
  <p></p>
  <a class="btn btn-primary" th:href="@{/}">To Products Page</a>
</div>

</body>

</html>
